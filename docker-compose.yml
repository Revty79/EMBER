services:
  ember:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ember
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: ${DATABASE_URL:-postgresql://ember_app:change-me@postgres:5432/ember}
      APP_SECRET: ${APP_SECRET:-replace-with-a-long-random-secret}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      MINECRAFT_BRIDGE_TOKEN: ${MINECRAFT_BRIDGE_TOKEN:-}
      MINECRAFT_SHADOW_ENABLED: ${MINECRAFT_SHADOW_ENABLED:-false}
      MINECRAFT_SHADOW_MODEL: ${MINECRAFT_SHADOW_MODEL:-}
      MINECRAFT_SHADOW_RESPONSE_MODE: ${MINECRAFT_SHADOW_RESPONSE_MODE:-deep}
      MINECRAFT_SHADOW_STORE_OBSERVATIONS: ${MINECRAFT_SHADOW_STORE_OBSERVATIONS:-true}
      MINECRAFT_SHADOW_MAX_RECENT: ${MINECRAFT_SHADOW_MAX_RECENT:-25}
      MINECRAFT_SUPERVISED_ENABLED: ${MINECRAFT_SUPERVISED_ENABLED:-false}
      MINECRAFT_SUPERVISED_MODEL: ${MINECRAFT_SUPERVISED_MODEL:-}
      MINECRAFT_SUPERVISED_RESPONSE_MODE: ${MINECRAFT_SUPERVISED_RESPONSE_MODE:-deep}
      MINECRAFT_SUPERVISED_ALLOWED_ACTIONS: ${MINECRAFT_SUPERVISED_ALLOWED_ACTIONS:-status,look,eat_if_hungry,go_home,flee,wander_yard,stop}
      MINECRAFT_SUPERVISED_MAX_ACTIONS: ${MINECRAFT_SUPERVISED_MAX_ACTIONS:-1}
      MINECRAFT_SUPERVISED_REQUIRE_CONFIDENCE: ${MINECRAFT_SUPERVISED_REQUIRE_CONFIDENCE:-medium}
      MINECRAFT_BRIDGE_DEBUG: ${MINECRAFT_BRIDGE_DEBUG:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - ollama
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ember-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ember
      POSTGRES_USER: ember_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres-data:
  ollama-data:
